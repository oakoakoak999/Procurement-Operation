name: PR2PO batch (manual, one BU)

# Manual, single-BU run of the PR2PO batch on a cloud runner.
# Proves the full chain works on GitHub Actions: Windows runner -> materialize
# config/tokens from secrets -> headless Chrome -> Odoo login -> Google OAuth
# refresh -> pipeline. Env is UAT (lib/config.mjs auto-selects odooUrlGha on
# GITHUB_ACTIONS); prod is not wired.
#
# The `mode` input controls how far the run goes:
#   dry-run           --test              no generate click, no dedup-log write (side-effect-free)
#   rehearse-generate --generate --test   exercises row selection/scoping, then Escapes — still 0 POs
#   generate-live     --generate          FIRES REAL POs — clicks "Generate to PO" in Odoo
# generate-live produces unconfirmed POs (the confirm-PO step is separate and
# untouched) — reversible, no vendor dispatch. Use deliberately.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile: supply | medicine"
        default: supply
        required: true
      bu:
        description: "Single BU code (e.g. PKPP)"
        default: PKPP
        required: true
      mode:
        description: "How far to run"
        type: choice
        default: dry-run
        required: true
        options:
          - dry-run
          - rehearse-generate
          - generate-live

permissions:
  contents: write   # runner must push the agent-memory folder (Decision Log) back on a real run

jobs:
  run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Playwright
        run: npx playwright install chrome

      - name: Materialize config + tokens from secrets
        shell: bash
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
          GSHEETS_TOKEN_JSON: ${{ secrets.GSHEETS_TOKEN_JSON }}
          GDRIVE_PO_TOKEN_JSON: ${{ secrets.GDRIVE_PO_TOKEN_JSON }}
        run: |
          # Write each secret to its file via env->printf (no interpretation, no echo).
          printf '%s' "$CONFIG_JSON"          > config.json
          printf '%s' "$GSHEETS_TOKEN_JSON"   > .gsheets-token.json
          printf '%s' "$GDRIVE_PO_TOKEN_JSON" > .gdrive-po-token.json
          # Validate each is well-formed JSON WITHOUT printing contents
          # (jq stderr can echo a fragment of a mangled secret -> silence it).
          for f in config.json .gsheets-token.json .gdrive-po-token.json; do
            if jq empty "$f" 2>/dev/null; then echo "$f: ok"; else echo "$f: INVALID JSON"; exit 1; fi
          done

      - name: Run one BU (headless)
        shell: bash
        env:
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          GDRIVE_CLIENT_ID: ${{ vars.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          # Cloudflare Access service token — opens the gha door from the cloud runner.
          # No-op locally (cfAccessHeaders() returns {} when these are unset).
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          PROFILE: ${{ inputs.profile }}
          BU: ${{ inputs.bu }}
          MODE: ${{ inputs.mode }}
        run: |
          # Translate the mode input into pipeline flags. Fail closed on anything
          # unexpected so a typo can never fall through to a live generate.
          case "$MODE" in
            dry-run)           FLAGS="--test" ;;
            rehearse-generate) FLAGS="--generate --test" ;;
            generate-live)     FLAGS="--generate" ;;
            *) echo "Unknown mode: $MODE" >&2; exit 1 ;;
          esac
          echo "[MODE] $MODE -> $FLAGS"
          node run-batch.mjs "$PROFILE" $FLAGS --headless --bu="$BU" --max-parallel=1

      - name: Upload run summary (structured files only)
        # NOT runs/** — the raw per-BU .log is unfiltered child stderr, and
        # artifact contents are stored UNMASKED (GitHub only masks the live log
        # view). Upload only the structured files, built from named fields.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-summary
          path: |
            runs/**/summary.md
            runs/**/summary.json
            runs/**/*.result.json
          if-no-files-found: warn
