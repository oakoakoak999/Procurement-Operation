name: Secret smoke test

# Verifies that GitHub Actions secrets/variables are wired and well-formed.
# It does NOT prove the credentials still work (see note at bottom).
# Prints only present/missing booleans and JSON key presence — never any secret value.
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Scalar secrets present?
        env:
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_CLIENT_ID_SECRET: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_ID_VAR: ${{ vars.GDRIVE_CLIENT_ID }}
        run: |
          check() { if [ -z "$2" ]; then echo "MISSING  $1"; else echo "present  $1"; fi; }
          check ODOO_USERNAME              "$ODOO_USERNAME"
          check ODOO_PASSWORD              "$ODOO_PASSWORD"
          check GDRIVE_CLIENT_SECRET       "$GDRIVE_CLIENT_SECRET"
          check "GDRIVE_CLIENT_ID (secret)"   "$GDRIVE_CLIENT_ID_SECRET"
          check "GDRIVE_CLIENT_ID (variable)" "$GDRIVE_CLIENT_ID_VAR"

      - name: JSON secrets parse and contain expected keys?
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
          GSHEETS_TOKEN_JSON: ${{ secrets.GSHEETS_TOKEN_JSON }}
          GDRIVE_PO_TOKEN_JSON: ${{ secrets.GDRIVE_PO_TOKEN_JSON }}
        run: |
          # jq errors can echo a fragment of malformed input (an unmasked secret substring),
          # so every jq call is silenced with 2>/dev/null. Only booleans/counts are printed.
          valid_json() { jq empty <<< "$1" 2>/dev/null; }

          echo "=== CONFIG_JSON ==="
          if [ -z "$CONFIG_JSON" ]; then
            echo "MISSING"
          elif valid_json "$CONFIG_JSON"; then
            echo "valid JSON"
            for k in odooUrl refSheet buOdooPrefix buLogSheets buOrderFolders; do
              if jq -e "has(\"$k\")" <<< "$CONFIG_JSON" >/dev/null 2>&1; then echo "  key $k: yes"; else echo "  key $k: NO"; fi
            done
            bu=$(jq '.buOdooPrefix | length' <<< "$CONFIG_JSON" 2>/dev/null)
            echo "  BU count: ${bu:-?}"
          else
            echo "NOT valid JSON (secret may be mangled)"
          fi

          for name in GSHEETS_TOKEN_JSON GDRIVE_PO_TOKEN_JSON; do
            echo "=== $name ==="
            val="${!name}"
            if [ -z "$val" ]; then
              echo "MISSING"
            elif valid_json "$val"; then
              echo "valid JSON"
              if jq -e 'has("refresh_token")' <<< "$val" >/dev/null 2>&1; then echo "  refresh_token: yes"; else echo "  refresh_token: NO"; fi
            else
              echo "NOT valid JSON (secret may be mangled)"
            fi
          done

      - name: Summary
        run: echo "Smoke test complete — this proves wiring + JSON validity, NOT that credentials still authenticate."
